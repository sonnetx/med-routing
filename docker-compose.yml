services:
  med-routing:
    build: .
    container_name: med-routing
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./hf_cache:/app/hf_cache
      - ./runs:/app/runs
      - ./audit:/app/audit
      - ./data:/app/data

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: med-routing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    depends_on:
      - med-routing

  grafana:
    image: grafana/grafana:11.3.0
    container_name: med-routing-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/med_routing.json
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Read-only mount so Grafana can query the audit DB without ever
      # writing to it. The med-routing container is the only writer.
      - ./data:/var/lib/grafana-data:ro
    depends_on:
      - prometheus

volumes:
  prom-data:
